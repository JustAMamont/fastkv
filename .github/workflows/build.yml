name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────
  # Server build
  # ──────────────────────────────────────────────
  server:
    name: Server (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - uses: Swatinem/rust-cache@v2

      - name: Build (default)
        run: cargo build --release --locked

      - name: Build (io_uring, Linux only)
        if: runner.os == 'Linux'
        run: cargo build --release --locked --features io-uring

      - name: Run unit tests
        run: cargo test --locked

  # ──────────────────────────────────────────────
  # Rust client
  # ──────────────────────────────────────────────
  client-rust:
    name: Rust client (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: server
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - uses: Swatinem/rust-cache@v2

      - name: Build & test
        env:
          FASTKV_HOST: localhost
          FASTKV_PORT: "6379"
        shell: bash
        run: |
          cargo run --release -- server 6379 &
          for i in $(seq 1 60); do
            node -e "const s=require('net').createConnection(6379,'localhost',()=>{process.exit(0)});s.on('error',()=>process.exit(1))" 2>/dev/null && break
            sleep 0.5
          done
          cd clients/rust
          cargo test -- --test-threads=1

  # ──────────────────────────────────────────────
  # Go client — cross-compile all targets
  # ──────────────────────────────────────────────
  client-go:
    name: Go client
    runs-on: ubuntu-latest
    needs: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Cross-compile
        working-directory: clients/go/fastkv
        env:
          CGO_ENABLED: "0"
        run: |
          targets=(
            "linux   amd64"
            "linux   arm64"
            "windows amd64 .exe"
            "windows arm64 .exe"
            "darwin  amd64"
            "darwin  arm64"
          )
          mkdir -p bin
          for t in "${targets[@]}"; do
            read os arch ext <<< "$t"
            out="bin/fastkv-${os}-${arch}${ext}"
            echo "Building $out ..."
            GOOS=$os GOARCH=$arch go build -trimpath -ldflags="-s -w" -o "$out" .
          done

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: go-client-binaries
          path: clients/go/fastkv/bin/

      - name: Run tests
        env:
          FASTKV_ADDR: "localhost:6379"
        shell: bash
        run: |
          cargo run --release -- server 6379 &
          for i in $(seq 1 60); do
            node -e "const s=require('net').createConnection(6379,'localhost',()=>{process.exit(0)});s.on('error',()=>process.exit(1))" 2>/dev/null && break
            sleep 0.5
          done
          cd clients/go/fastkv
          go test -v -count=1 -timeout 30s ./...

  # ──────────────────────────────────────────────
  # Java client — compile & test on each OS
  # ──────────────────────────────────────────────
  client-java:
    name: Java client (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: server
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - uses: Swatinem/rust-cache@v2

      - name: Build & test
        shell: bash
        run: |
          mkdir -p clients/java/target/classes
          javac -d clients/java/target/classes clients/java/src/*.java
          cargo run --release -- server 6379 &
          for i in $(seq 1 60); do
            node -e "const s=require('net').createConnection(6379,'localhost',()=>{process.exit(0)});s.on('error',()=>process.exit(1))" 2>/dev/null && break
            sleep 0.5
          done
          java -Dfastkv.host=localhost -Dfastkv.port=6379 -cp clients/java/target/classes com.fastkv.client.IntegrationTest
          java -Dfastkv.host=localhost -Dfastkv.port=6379 -cp clients/java/target/classes com.fastkv.client.IntegrationTestReactive

  # ──────────────────────────────────────────────
  # Node.js client — test on each OS
  # ──────────────────────────────────────────────
  client-node:
    name: Node.js client (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: server
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - uses: Swatinem/rust-cache@v2

      - name: Build & test
        shell: bash
        run: |
          cargo run --release -- server 6379 &
          for i in $(seq 1 60); do
            node -e "const s=require('net').createConnection(6379,'localhost',()=>{process.exit(0)});s.on('error',()=>process.exit(1))" 2>/dev/null && break
            sleep 0.5
          done
          node clients/node/fastkv/tests/test_integration.js localhost 6379

  # ──────────────────────────────────────────────
  # Python client — test on each OS
  # ──────────────────────────────────────────────
  client-python:
    name: Python client (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: server
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - uses: Swatinem/rust-cache@v2

      - name: Build & test
        env:
          FASTKV_HOST: localhost
          FASTKV_PORT: "6379"
        shell: bash
        run: |
          cargo run --release -- server 6379 &
          for i in $(seq 1 60); do
            node -e "const s=require('net').createConnection(6379,'localhost',()=>{process.exit(0)});s.on('error',()=>process.exit(1))" 2>/dev/null && break
            sleep 0.5
          done
          python clients/python/tests/test_integration.py
          python clients/python/tests/test_async_integration.py
