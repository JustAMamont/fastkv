name: CI

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Test + Build server binaries on each platform
  # ═══════════════════════════════════════════════════════════════════════
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
            artifact: fastkv-server-linux-amd64
            binary: fast_kv
            native: true
          - os: windows-latest
            label: windows-amd64
            artifact: fastkv-server-windows-amd64.exe
            binary: fast_kv.exe
            native: true
          - os: macos-latest
            label: darwin-arm64
            artifact: fastkv-server-darwin-arm64
            binary: fast_kv
            native: true
          - os: macos-latest
            label: darwin-amd64
            artifact: fastkv-server-darwin-amd64
            binary: fast_kv
            target: x86_64-apple-darwin
            native: false
    runs-on: ${{ matrix.os }}
    env:
      FASTKV_PORT: "6379"
      FASTKV_HOST: "127.0.0.1"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      # ── Rust ────────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Cross-compile target for darwin-amd64 on ARM runner
      - name: Add cross-compile target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Rust unit tests
        if: matrix.native
        run: cargo test --release

      - name: Build server
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cargo build --release --target ${{ matrix.target }}
          else
            cargo build --release
          fi

      # ── Integration tests (native platforms only) ──────────────────────
      - uses: actions/setup-python@v5
        if: matrix.native
        with:
          python-version: '3.12'

      - uses: actions/setup-go@v5
        if: matrix.native
        with:
          go-version: '1.21'
          cache: false

      - uses: actions/setup-java@v4
        if: matrix.native
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        if: matrix.native
        with:
          node-version: '20'

      # CRITICAL: GitHub Actions kills background processes between steps.
      # Server start and ALL client tests MUST run in the same `run:` block.
      - name: Run integration tests
        if: matrix.native
        shell: bash
        run: |
          # ── Start server ──────────────────────────────────────────────
          if [ -f "./target/release/fast_kv.exe" ]; then
            SERVER="./target/release/fast_kv.exe"
          else
            SERVER="./target/release/fast_kv"
          fi
          "$SERVER" server --port "$FASTKV_PORT" > /dev/null 2>&1 &

          # ── Wait for server (cross-platform via Node.js) ──────────────
          node -e "
            const net = require('net');
            const port = parseInt(process.env.FASTKV_PORT);
            let attempts = 0;
            function check() {
              const s = net.createConnection({host:'127.0.0.1',port:port}, () => {
                s.end();
                console.log('Server ready on port ' + port);
                process.exit(0);
              });
              s.on('error', () => {
                if (++attempts > 60) {
                  console.error('Server failed to start after 30s');
                  process.exit(1);
                }
                setTimeout(check, 500);
              });
            }
            check();
          "
          if [ $? -ne 0 ]; then
            echo "ERROR: Server did not start"
            exit 1
          fi

          # ── Export env for all clients ────────────────────────────────
          export FASTKV_HOST="$FASTKV_HOST"
          export FASTKV_PORT="$FASTKV_PORT"

          # ── Track failures ────────────────────────────────────────────
          FAIL_LIST=""

          run_test() {
            local name="$1"
            shift
            echo ">>> [$name] running..."
            "$@" 2>&1
            local rc=$?
            if [ $rc -eq 0 ]; then
              echo ">>> [$name] PASS"
            else
              echo ">>> [$name] FAIL (exit code $rc)"
              FAIL_LIST="$FAIL_LIST $name"
            fi
            return 0
          }

          # ── Python sync ──────────────────────────────────────────────
          run_test "Python-sync" \
            python clients/python/tests/test_integration.py

          # ── Python async (non-fatal) ─────────────────────────────────
          run_test "Python-async" \
            python clients/python/tests/test_async_integration.py

          # ── Go ──────────────────────────────────────────────────────
          run_test "Go" \
            sh -c "cd clients/go/fastkv && go test -count=1 -timeout 60s -run '^Test' ./..."

          # ── Java ────────────────────────────────────────────────────
          mkdir -p clients/java/target/test-classes
          javac -encoding UTF-8 -d clients/java/target/test-classes clients/java/src/*.java 2>&1
          if [ $? -eq 0 ]; then
            run_test "Java" \
              java -Dfastkv.host="$FASTKV_HOST" -Dfastkv.port="$FASTKV_PORT" \
                   -cp clients/java/target/test-classes \
                   com.fastkv.client.IntegrationTest
          else
            echo ">>> [Java] FAIL (compilation error)"
            FAIL_LIST="$FAIL_LIST Java"
          fi

          # ── Node.js ────────────────────────────────────────────────
          run_test "Node" \
            node clients/node/fastkv/tests/test_integration.js "$FASTKV_HOST" "$FASTKV_PORT"

          # ── Rust client ────────────────────────────────────────────
          run_test "Rust-client" \
            sh -c "cd clients/rust && cargo test -- --test-threads=1 2>&1"

          # ── Summary ────────────────────────────────────────────────
          echo ""
          if [ -z "$FAIL_LIST" ]; then
            echo "========== ALL TESTS PASSED =========="
            exit 0
          else
            echo "========== FAILED:$FAIL_LIST =========="
            exit 1
          fi

      # ── Upload server binary (release only) ────────────────────────────
      - name: Prepare server artifact
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          mkdir -p dist
          if [ -n "${{ matrix.target }}" ]; then
            cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"
          else
            cp "target/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"
          fi
          chmod +x "dist/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: server-${{ matrix.label }}
          path: dist/*
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════════
  # Build client library packages + GitHub Release
  # ═══════════════════════════════════════════════════════════════════════
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # ── Extract version from tag (v0.4.0 -> 0.4.0) ──────────────────
      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building release for version: $VERSION"

      # ── Download server binaries from build matrix ────────────────────
      - uses: actions/download-artifact@v4
        with:
          pattern: server-*
          path: release-assets
          merge-multiple: true

      # ══════════════════════════════════════════════════════════════════
      # Python client  ->  pip install fastkv-{version}-py3-none-any.whl
      # ══════════════════════════════════════════════════════════════════
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Python client packages
        run: |
          pip install build
          cd clients/python
          # Inject version from tag
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml
          python -m build
          cp dist/fastkv-*.whl dist/fastkv-*.tar.gz ../../release-assets/ || true

      # ══════════════════════════════════════════════════════════════════
      # Node.js client  ->  npm install fastkv-client-{version}.tgz
      # ══════════════════════════════════════════════════════════════════
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Node.js client package
        run: |
          cd clients/node/fastkv
          # Inject version from tag
          sed -i 's/"version": ".*"/"version": "${{ steps.version.outputs.version }}"/' package.json
          npm pack
          cp *.tgz ../../../release-assets/

      # ══════════════════════════════════════════════════════════════════
      # Java client  ->  fastkv-client-java-{version}.jar  (classpath)
      # ══════════════════════════════════════════════════════════════════
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Java client jar
        run: |
          mkdir -p clients/java/target/classes
          javac -encoding UTF-8 -d clients/java/target/classes \
            clients/java/src/FastKVClient.java \
            clients/java/src/FastKVReactiveClient.java \
            clients/java/src/Pipeline.java \
            clients/java/src/ReactivePipeline.java \
            clients/java/src/RespEncoder.java \
            clients/java/src/RespDecoder.java \
            clients/java/src/FastKVException.java \
            clients/java/src/FastKVConnectionException.java \
            clients/java/src/FastKVResponseException.java
          jar cf "release-assets/fastkv-client-java-${{ steps.version.outputs.version }}.jar" \
            -C clients/java/target/classes .

      # ══════════════════════════════════════════════════════════════════
      # Go client  ->  go get / vendor source  (library, no binary)
      # ══════════════════════════════════════════════════════════════════
      - name: Package Go client source
        run: |
          cd clients/go
          tar czf "../../release-assets/fastkv-client-go-v${{ steps.version.outputs.version }}.tar.gz" fastkv/

      # ══════════════════════════════════════════════════════════════════
      # Rust client  ->  cargo add / path dependency  (library, no binary)
      # ══════════════════════════════════════════════════════════════════
      - name: Package Rust client source
        run: |
          cd clients/rust
          tar czf "../../release-assets/fastkv-client-rust-v${{ steps.version.outputs.version }}.tar.gz" \
            --exclude='target' \
            --exclude='.git' \
            .

      # ── Verify all assets ────────────────────────────────────────────
      - name: List release assets
        run: |
          echo "=== Release assets ==="
          ls -lh release-assets/

      # ── Delete old release if exists (avoid duplicate assets) ────────
      - name: Delete old release if exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${GITHUB_REF_NAME}" --yes 2>/dev/null || true

      # ── Create GitHub Release ────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
