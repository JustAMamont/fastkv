name: CI

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Test + Build server binaries on each platform
  # ═══════════════════════════════════════════════════════════════════════
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
            artifact: fastkv-server-linux-amd64
            binary: fast_kv
            native: true
          - os: windows-latest
            label: windows-amd64
            artifact: fastkv-server-windows-amd64.exe
            binary: fast_kv.exe
            native: true
          - os: macos-latest
            label: darwin-arm64
            artifact: fastkv-server-darwin-arm64
            binary: fast_kv
            native: true
          - os: macos-latest
            label: darwin-amd64
            artifact: fastkv-server-darwin-amd64
            binary: fast_kv
            target: x86_64-apple-darwin
            native: false
    runs-on: ${{ matrix.os }}
    env:
      FASTKV_PORT: "6379"
      FASTKV_HOST: "127.0.0.1"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      # ── Rust ────────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Cross-compile target for darwin-amd64 on ARM runner
      - name: Add cross-compile target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Rust unit tests (Linux, with io-uring)
        if: matrix.native && matrix.label == 'linux-amd64'
        # v1.5.0+: blob-store and similarity are no longer cargo features —
        # they are always compiled in. Only io-uring remains a feature,
        # and it is Linux-only (the io-uring crate uses Linux-specific libc
        # symbols like MAP_POPULATE and SYS_io_uring_setup that are not
        # present on macOS or Windows).
        run: cargo test --release --features io-uring

      - name: Rust unit tests (macOS / Windows, no io-uring)
        if: matrix.native && matrix.label != 'linux-amd64'
        run: cargo test --release

      - name: Build server
        shell: bash
        run: |
          # v1.5.0+: Blob Arena, Similarity, and compressed WAL are always compiled in.
          # The only remaining compile-time feature is io-uring (Linux only).
          FEATURES=""
          if [ "${{ matrix.label }}" = "linux-amd64" ]; then
            FEATURES="io-uring"
          fi
          if [ -n "${{ matrix.target }}" ]; then
            if [ -n "$FEATURES" ]; then
              cargo build --release --features "$FEATURES" --target ${{ matrix.target }}
            else
              cargo build --release --target ${{ matrix.target }}
            fi
          else
            if [ -n "$FEATURES" ]; then
              cargo build --release --features "$FEATURES"
            else
              cargo build --release
            fi
          fi

      # ── Integration tests (native platforms only) ──────────────────────
      # First-party SDKs shipped in this repo: Python (sync + async) + Rust.
      # For Go / Java / Node.js / other languages, use any community Redis
      # client — FastKV speaks standard RESP. See README.md for snippets.
      - uses: actions/setup-python@v5
        if: matrix.native
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        if: matrix.native
        with:
          node-version: '20'

      # CRITICAL: GitHub Actions kills background processes between steps.
      # Server start and ALL client tests MUST run in the same `run:` block.
      - name: Run integration tests
        if: matrix.native
        shell: bash
        run: |
          # ── Start server ──────────────────────────────────────────────
          if [ -f "./target/release/fast_kv.exe" ]; then
            SERVER="./target/release/fast_kv.exe"
          else
            SERVER="./target/release/fast_kv"
          fi
          "$SERVER" server --port "$FASTKV_PORT" > /dev/null 2>&1 &

          # ── Wait for server (cross-platform via Node.js) ──────────────
          node -e "
            const net = require('net');
            const port = parseInt(process.env.FASTKV_PORT);
            let attempts = 0;
            function check() {
              const s = net.createConnection({host:'127.0.0.1',port:port}, () => {
                s.end();
                console.log('Server ready on port ' + port);
                process.exit(0);
              });
              s.on('error', () => {
                if (++attempts > 60) {
                  console.error('Server failed to start after 30s');
                  process.exit(1);
                }
                setTimeout(check, 500);
              });
            }
            check();
          "
          if [ $? -ne 0 ]; then
            echo "ERROR: Server did not start"
            exit 1
          fi

          # ── Export env for all clients ────────────────────────────────
          export FASTKV_HOST="$FASTKV_HOST"
          export FASTKV_PORT="$FASTKV_PORT"

          # ── Track failures ────────────────────────────────────────────
          FAIL_LIST=""

          run_test() {
            local name="$1"
            shift
            echo ">>> [$name] running..."
            "$@" 2>&1
            local rc=$?
            if [ $rc -eq 0 ]; then
              echo ">>> [$name] PASS"
            else
              echo ">>> [$name] FAIL (exit code $rc)"
              FAIL_LIST="$FAIL_LIST $name"
            fi
            return 0
          }

          # ── Python sync ──────────────────────────────────────────────
          run_test "Python-sync" \
            python clients/python/tests/test_integration.py

          # ── Python async ─────────────────────────────────────────────
          run_test "Python-async" \
            python clients/python/tests/test_async_integration.py

          # ── Rust client ────────────────────────────────────────────
          run_test "Rust-client" \
            sh -c "cd clients/rust && cargo test -- --test-threads=1 2>&1"

          # ── Summary ────────────────────────────────────────────────
          echo ""
          if [ -z "$FAIL_LIST" ]; then
            echo "========== ALL TESTS PASSED =========="
            exit 0
          else
            echo "========== FAILED:$FAIL_LIST =========="
            exit 1
          fi

      # ── Upload server binary (release only) ────────────────────────────
      - name: Prepare server artifact
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          mkdir -p dist
          if [ -n "${{ matrix.target }}" ]; then
            cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"
          else
            cp "target/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"
          fi
          chmod +x "dist/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: server-${{ matrix.label }}
          path: dist/*
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════════
  # Build first-party client library packages + GitHub Release
  # ═══════════════════════════════════════════════════════════════════════
  # Only Python and Rust clients are first-party (shipped in this repo).
  # For Go / Java / Node.js / other languages, use any community Redis
  # client — FastKV speaks standard RESP.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # ── Extract version from tag (v1.5.0 -> 1.5.0) ──────────────────
      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building release for version: $VERSION"

      # ── Download server binaries from build matrix ────────────────────
      - uses: actions/download-artifact@v4
        with:
          pattern: server-*
          path: release-assets
          merge-multiple: true

      # ══════════════════════════════════════════════════════════════════
      # Python client  ->  pip install fastkv-{version}-py3-none-any.whl
      # ══════════════════════════════════════════════════════════════════
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Python client packages
        run: |
          pip install build
          cd clients/python
          # Inject version from tag (keeps __init__.py + pyproject.toml in sync)
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml
          sed -i "s/^__version__ = \".*\"/__version__ = \"${{ steps.version.outputs.version }}\"/" fastkv/__init__.py
          python -m build
          cp dist/fastkv-*.whl dist/fastkv-*.tar.gz ../../release-assets/ || true

      # ══════════════════════════════════════════════════════════════════
      # Rust client  ->  cargo add / path dependency  (library, no binary)
      # ══════════════════════════════════════════════════════════════════
      - name: Package Rust client source
        run: |
          cd clients/rust
          # Inject version from tag
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" Cargo.toml
          tar czf "../../release-assets/fastkv-client-rust-v${{ steps.version.outputs.version }}.tar.gz" \
            --exclude='target' \
            --exclude='.git' \
            .

      # ── Verify all assets ────────────────────────────────────────────
      - name: List release assets
        run: |
          echo "=== Release assets ==="
          ls -lh release-assets/

      # ── Delete old release if exists (avoid duplicate assets) ────────
      - name: Delete old release if exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${GITHUB_REF_NAME}" --yes 2>/dev/null || true

      # ── Create GitHub Release ────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
