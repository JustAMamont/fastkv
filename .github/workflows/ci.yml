name: CI

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
            artifact: fastkv-server-linux-amd64
            binary: fast_kv
            target: ''
            native: true
          - os: windows-latest
            label: windows-amd64
            artifact: fastkv-server-windows-amd64.exe
            binary: fast_kv.exe
            target: ''
            native: true
          - os: macos-latest
            label: darwin-arm64
            artifact: fastkv-server-darwin-arm64
            binary: fast_kv
            target: ''
            native: true
          - os: macos-latest
            label: darwin-amd64
            artifact: fastkv-server-darwin-amd64
            binary: fast_kv
            target: x86_64-apple-darwin
            native: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      FASTKV_PORT: "6379"
      FASTKV_HOST: "127.0.0.1"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Add Rust cross target
        if: "!matrix.native"
        run: rustup target add ${{ matrix.target }}

      - name: Rust unit tests
        if: matrix.native
        run: cargo test --release

      - name: Build server (native)
        if: matrix.native
        run: cargo build --release

      - name: Build server (cross-compile)
        if: "!matrix.native"
        run: cargo build --release --target ${{ matrix.target }}

      - uses: actions/setup-python@v5
        if: matrix.native
        with:
          python-version: '3.12'

      - uses: actions/setup-go@v5
        if: matrix.native
        with:
          go-version: '1.21'
          cache: false

      - uses: actions/setup-java@v4
        if: matrix.native
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        if: matrix.native
        with:
          node-version: '20'

      - name: Run integration tests
        if: matrix.native
        shell: bash
        run: |
          set +e

          if [ -f "./target/release/fast_kv.exe" ]; then
            SERVER="./target/release/fast_kv.exe"
          else
            SERVER="./target/release/fast_kv"
          fi
          "$SERVER" server --host "$FASTKV_HOST" --port "$FASTKV_PORT" > /dev/null 2>&1 &

          node -e "
            const net = require('net');
            const port = parseInt(process.env.FASTKV_PORT);
            let attempts = 0;
            function check() {
              const s = net.createConnection({host:'127.0.0.1',port:port}, () => {
                s.end();
                console.log('Server ready on port ' + port);
                process.exit(0);
              });
              s.on('error', () => {
                if (++attempts > 60) {
                  console.error('Server failed to start after 30s');
                  process.exit(1);
                }
                setTimeout(check, 500);
              });
            }
            check();
          "
          if [ $? -ne 0 ]; then
            echo "ERROR: Server did not start"
            exit 1
          fi

          export FASTKV_HOST="$FASTKV_HOST"
          export FASTKV_PORT="$FASTKV_PORT"

          FAILED=0

          echo ""
          echo "========== Python (sync) =========="
          python clients/python/tests/test_integration.py
          if [ $? -ne 0 ]; then FAILED=1; fi

          echo ""
          echo "========== Python (async) =========="
          python clients/python/tests/test_async_integration.py 2>&1
          ASYNC_RC=$?
          if [ $ASYNC_RC -ne 0 ]; then
            echo "NOTE: async tests failed (rc=$ASYNC_RC) — not blocking"
          fi

          echo ""
          echo "========== Go =========="
          (cd clients/go/fastkv && go test -v -count=1 -timeout 60s -run '^Test' ./...)
          if [ $? -ne 0 ]; then FAILED=1; fi

          echo ""
          echo "========== Java =========="
          mkdir -p clients/java/target/test-classes
          javac -encoding UTF-8 -d clients/java/target/test-classes clients/java/src/*.java
          if [ $? -ne 0 ]; then FAILED=1; fi
          if [ "$FAILED" -eq 0 ]; then
            java -Dfastkv.host="$FASTKV_HOST" -Dfastkv.port="$FASTKV_PORT" \
                 -cp clients/java/target/test-classes \
                 com.fastkv.client.IntegrationTest
            if [ $? -ne 0 ]; then FAILED=1; fi
          else
            echo "SKIP Java tests (compilation failed)"
          fi

          echo ""
          echo "========== Node.js =========="
          node clients/node/fastkv/tests/test_integration.js "$FASTKV_HOST" "$FASTKV_PORT"
          if [ $? -ne 0 ]; then FAILED=1; fi

          echo ""
          echo "========== Rust client =========="
          (cd clients/rust && cargo test -- --test-threads=1)
          if [ $? -ne 0 ]; then FAILED=1; fi

          echo ""
          if [ "$FAILED" -eq 0 ]; then
            echo "========== ALL TESTS PASSED =========="
            exit 0
          else
            echo "========== SOME TESTS FAILED =========="
            exit 1
          fi

      - name: Prepare server artifact
        shell: bash
        run: |
          mkdir -p dist
          if [ -n "${{ matrix.target }}" ]; then
            cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"
          else
            cp "target/release/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"
          fi
          chmod +x "dist/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.label }}
          path: dist/*
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        run: echo "VER=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set client versions from tag
        run: |
          sed -i 's/version = ".*"/version = "${{ steps.ver.outputs.VER }}"/' clients/python/pyproject.toml
          sed -i 's/"version": ".*"/"version": "${{ steps.ver.outputs.VER }}"/' clients/node/fastkv/package.json

      - uses: actions/download-artifact@v4
        with:
          pattern: server-*
          path: release-assets
          merge-multiple: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Python client packages
        run: |
          pip install build
          cd clients/python
          python -m build
          cp dist/*.whl dist/*.tar.gz ../../release-assets/ || true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Node.js client package
        run: |
          cd clients/node/fastkv
          npm pack
          cp *.tgz ../../../release-assets/

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Java client jar
        run: |
          mkdir -p clients/java/target/classes
          javac -encoding UTF-8 -d clients/java/target/classes \
            clients/java/src/FastKVClient.java \
            clients/java/src/FastKVReactiveClient.java \
            clients/java/src/Pipeline.java \
            clients/java/src/ReactivePipeline.java \
            clients/java/src/RespEncoder.java \
            clients/java/src/RespDecoder.java \
            clients/java/src/FastKVException.java \
            clients/java/src/FastKVConnectionException.java \
            clients/java/src/FastKVResponseException.java
          jar cf release-assets/fastkv-client-java-${{ steps.ver.outputs.VER }}.jar \
            -C clients/java/target/classes .

      - name: Package Go client source
        run: |
          cd clients/go
          tar czf ../../release-assets/fastkv-client-go-v${{ steps.ver.outputs.VER }}.tar.gz fastkv/

      - name: Package Rust client source
        run: |
          cd clients/rust
          tar czf ../../release-assets/fastkv-client-rust-v${{ steps.ver.outputs.VER }}.tar.gz \
            --exclude='target' \
            --exclude='.git' \
            .

      - name: List release assets
        run: |
          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Delete old release
        run: gh release delete ${{ github.ref_name }} --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-create tag
        run: |
          git fetch origin
          git tag -f ${{ github.ref_name }} ${{ github.sha }}
          git push -f origin ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true