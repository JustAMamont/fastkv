name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build + Test on each platform ─────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      FASTKV_PORT: "6379"
      FASTKV_HOST: "127.0.0.1"
    steps:
      - uses: actions/checkout@v4

      # ── Rust ────────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Server unit tests
        run: cargo test --release

      - name: Build server
        run: cargo build --release

      # ── Language runtimes ───────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Integration tests (server + ALL clients in ONE step) ───────────
      # CRITICAL: GitHub Actions kills background processes between steps.
      # Server start and ALL client tests MUST run in the same `run` block.
      - name: Run client integration tests
        shell: bash
        run: |
          set +e

          # ── Start server ───────────────────────────────────────────────
          if [ -f "./target/release/fast_kv.exe" ]; then
            SERVER="./target/release/fast_kv.exe"
          else
            SERVER="./target/release/fast_kv"
          fi
          "$SERVER" server "$FASTKV_PORT" > /dev/null 2>&1 &

          # ── Wait for server (cross-platform via Node.js) ────────────────
          node -e "
            const net = require('net');
            const port = parseInt(process.env.FASTKV_PORT);
            let attempts = 0;
            function check() {
              const s = net.createConnection({host:'127.0.0.1',port:port}, () => {
                s.end();
                console.log('Server ready on port ' + port);
                process.exit(0);
              });
              s.on('error', () => {
                if (++attempts > 60) {
                  console.error('Server failed to start after 30s');
                  process.exit(1);
                }
                setTimeout(check, 500);
              });
            }
            check();
          "
          if [ $? -ne 0 ]; then
            echo "ERROR: Server did not start"
            exit 1
          fi

          # ── Export env for all clients ──────────────────────────────────
          export FASTKV_HOST="$FASTKV_HOST"
          export FASTKV_PORT="$FASTKV_PORT"
          export FASTKV_ADDR="${FASTKV_HOST}:${FASTKV_PORT}"

          FAILED=0

          # ── Python sync ────────────────────────────────────────────────
          echo ""
          echo "========== Python (sync) =========="
          python clients/python/tests/test_integration.py
          if [ $? -ne 0 ]; then FAILED=1; fi

          # ── Python async ────────────────────────────────────────────────
          echo ""
          echo "========== Python (async) =========="
          python clients/python/tests/test_async_integration.py
          if [ $? -ne 0 ]; then FAILED=1; fi

          # ── Go ──────────────────────────────────────────────────────────
          echo ""
          echo "========== Go =========="
          (cd clients/go/fastkv && go test -v -count=1 -timeout 60s -run '^Test' ./...)
          if [ $? -ne 0 ]; then FAILED=1; fi

          # ── Java ────────────────────────────────────────────────────────
          echo ""
          echo "========== Java =========="
          mkdir -p clients/java/target/test-classes
          # Use bash glob instead of `find | xargs` (Windows `find` is a different command)
          javac -encoding UTF-8 -d clients/java/target/test-classes clients/java/src/*.java
          if [ $? -ne 0 ]; then FAILED=1; fi
          if [ "$FAILED" -eq 0 ]; then
            java -Dfastkv.host="$FASTKV_HOST" -Dfastkv.port="$FASTKV_PORT" \
                 -cp clients/java/target/test-classes \
                 com.fastkv.client.IntegrationTest
            if [ $? -ne 0 ]; then FAILED=1; fi
          else
            echo "SKIP Java tests (compilation failed)"
          fi

          # ── Node.js ─────────────────────────────────────────────────────
          echo ""
          echo "========== Node.js =========="
          node clients/node/fastkv/tests/test_integration.js "$FASTKV_HOST" "$FASTKV_PORT"
          if [ $? -ne 0 ]; then FAILED=1; fi

          # ── Rust client ─────────────────────────────────────────────────
          echo ""
          echo "========== Rust client =========="
          (cd clients/rust && cargo test -- --test-threads=1)
          if [ $? -ne 0 ]; then FAILED=1; fi

          # ── Summary ─────────────────────────────────────────────────────
          echo ""
          if [ "$FAILED" -eq 0 ]; then
            echo "========== ALL TESTS PASSED =========="
            exit 0
          else
            echo "========== SOME TESTS FAILED =========="
            exit 1
          fi

      # ── Upload server binary (only for release) ────────────────────────
      - name: Prepare server artifact
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          mkdir -p dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp target/release/fast_kv.exe dist/fastkv-server-windows-amd64.exe
          elif [ "$RUNNER_OS" = "macOS" ]; then
            cp target/release/fast_kv dist/fastkv-server-darwin-arm64
          else
            cp target/release/fast_kv dist/fastkv-server-linux-amd64
          fi

      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: server-${{ matrix.os }}
          path: dist/*
          retention-days: 1

  # ─── Release (only on tag push) ────────────────────────────────────────
  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # ── Install cross-compilation target ───────────────────────────────
      - run: rustup target add x86_64-apple-darwin

      # ── Download native server binaries from test jobs ─────────────────
      - uses: actions/download-artifact@v4
        with:
          pattern: server-*
          path: release-assets
          merge-multiple: true

      # ── Cross-compile: macOS amd64 server ──────────────────────────────
      - name: Build server (macOS amd64)
        run: |
          cargo build --release --target x86_64-apple-darwin
          cp target/x86_64-apple-darwin/release/fast_kv release-assets/fastkv-server-darwin-amd64

      # ── Verify ─────────────────────────────────────────────────────────
      - name: List release assets
        run: ls -lh release-assets/

      # ── Create GitHub Release ──────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
