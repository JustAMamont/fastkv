name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build + Test on each platform ─────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      FASTKV_PORT: "6379"
      FASTKV_HOST: "127.0.0.1"
    steps:
      - uses: actions/checkout@v4

      # ── Rust ────────────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Server unit tests
        run: cargo test --release

      - name: Build server
        run: cargo build --release

      # ── Language runtimes ───────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          # No go.sum in the module — disable cache to avoid warnings
          cache: false

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Integration tests (server + clients in ONE step) ───────────────
      # CRITICAL: GitHub Actions kills background processes between steps.
      # Server start and ALL client tests MUST run in the same `run` block.
      - name: Run client integration tests
        shell: bash
        run: |
          # ── Start server ───────────────────────────────────────────────
          if [ -f "./target/release/fast_kv.exe" ]; then
            SERVER="./target/release/fast_kv.exe"
          else
            SERVER="./target/release/fast_kv"
          fi
          "$SERVER" server "$FASTKV_PORT" > /dev/null 2>&1 &

          # ── Wait for server (cross-platform via Node.js) ────────────────
          node -e "
            const net = require('net');
            const port = parseInt(process.env.FASTKV_PORT);
            let attempts = 0;
            function check() {
              const s = net.createConnection({host:'127.0.0.1',port:port}, () => {
                s.end();
                console.log('Server ready on port ' + port);
                process.exit(0);
              });
              s.on('error', () => {
                if (++attempts > 60) {
                  console.error('Server failed to start after 30s');
                  process.exit(1);
                }
                setTimeout(check, 500);
              });
            }
            check();
          "

          # ── Export env for all clients ──────────────────────────────────
          export FASTKV_HOST="$FASTKV_HOST"
          export FASTKV_PORT="$FASTKV_PORT"
          export FASTKV_ADDR="${FASTKV_HOST}:${FASTKV_PORT}"

          FAILED=0

          # ── Python sync ────────────────────────────────────────────────
          echo ""
          echo "========== Python (sync) =========="
          python clients/python/tests/test_integration.py || FAILED=1

          # ── Python async ────────────────────────────────────────────────
          echo ""
          echo "========== Python (async) =========="
          python clients/python/tests/test_async_integration.py || FAILED=1

          # ── Go ──────────────────────────────────────────────────────────
          echo ""
          echo "========== Go =========="
          (cd clients/go/fastkv && go test -v -count=1 -timeout 60s ./...) || FAILED=1

          # ── Java ────────────────────────────────────────────────────────
          echo ""
          echo "========== Java =========="
          mkdir -p clients/java/target/test-classes
          find clients/java/src -name '*.java' | xargs javac -d clients/java/target/test-classes
          java -Dfastkv.host="$FASTKV_HOST" -Dfastkv.port="$FASTKV_PORT" \
               -cp clients/java/target/test-classes \
               com.fastkv.client.IntegrationTest || FAILED=1

          # ── Node.js ─────────────────────────────────────────────────────
          echo ""
          echo "========== Node.js =========="
          node clients/node/fastkv/tests/test_integration.js "$FASTKV_HOST" "$FASTKV_PORT" || FAILED=1

          # ── Rust client ─────────────────────────────────────────────────
          echo ""
          echo "========== Rust client =========="
          (cd clients/rust && cargo test -- --test-threads=1) || FAILED=1

          # ── Summary ─────────────────────────────────────────────────────
          echo ""
          if [ "$FAILED" -eq 0 ]; then
            echo "========== ALL TESTS PASSED =========="
          else
            echo "========== SOME TESTS FAILED =========="
            exit 1
          fi

      # ── Upload server binary (only for release) ────────────────────────
      - name: Prepare server artifact
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          mkdir -p dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp target/release/fast_kv.exe dist/fastkv-server-windows-amd64.exe
          elif [ "$RUNNER_OS" = "macOS" ]; then
            cp target/release/fast_kv dist/fastkv-server-darwin-arm64
          else
            cp target/release/fast_kv dist/fastkv-server-linux-amd64
          fi

      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: server-${{ matrix.os }}
          path: dist/*
          retention-days: 1

  # ─── Release (only on tag push) ────────────────────────────────────────
  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      # ── Install Rust + cross-compilation targets ───────────────────────
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add x86_64-apple-darwin

      # ── Download native server binaries from test jobs ─────────────────
      - uses: actions/download-artifact@v4
        with:
          pattern: server-*
          path: release-assets
          merge-multiple: true

      # ── Cross-compile: macOS amd64 server ──────────────────────────────
      - name: Build server (macOS amd64)
        run: |
          cargo build --release --target x86_64-apple-darwin
          cp target/x86_64-apple-darwin/release/fast_kv release-assets/fastkv-server-darwin-amd64

      # ── Cross-compile: Go client for all platforms ─────────────────────
      - name: Build Go client (all platforms)
        env:
          CGO_ENABLED: "0"
        run: |
          cd clients/go/fastkv
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o ../../release-assets/fastkv-go-linux-amd64 .
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o ../../release-assets/fastkv-go-linux-arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o ../../release-assets/fastkv-go-windows-amd64.exe .
          GOOS=windows GOARCH=arm64 go build -ldflags="-s -w" -o ../../release-assets/fastkv-go-windows-arm64.exe .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o ../../release-assets/fastkv-go-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o ../../release-assets/fastkv-go-darwin-arm64 .

      # ── Verify ─────────────────────────────────────────────────────────
      - name: List release assets
        run: ls -lh release-assets/

      # ── Create GitHub Release ──────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
