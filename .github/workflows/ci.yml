name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────
  # 1. Server: build + unit tests
  # ──────────────────────────────────────
  server:
    name: Server (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Build io_uring
        if: runner.os == 'Linux'
        run: cargo build --release --features io-uring
      - name: Unit tests
        run: cargo test

  # ──────────────────────────────────────
  # 2. Rust client
  # ──────────────────────────────────────
  client-rust:
    name: Rust client (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: server
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - shell: bash
        run: |
          cargo run --release -- server 6379 &
          sleep 5
          cd clients/rust && cargo test -- --test-threads=1

  # ──────────────────────────────────────
  # 3. Go client (cross-compile + test)
  # ──────────────────────────────────────
  client-go:
    name: Go client
    runs-on: ubuntu-latest
    needs: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - name: Cross-compile
        working-directory: clients/go/fastkv
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p bin
          for entry in \
            "linux amd64" "linux arm64" \
            "windows amd64 .exe" "windows arm64 .exe" \
            "darwin amd64" "darwin arm64"; do
            read os arch ext <<< "$entry"
            echo "Building $os/$arch"
            GOOS=$os GOARCH=$arch go build -trimpath -ldflags="-s -w" -o "bin/fastkv-${os}-${arch}${ext}" .
          done
      - name: Test
        shell: bash
        run: |
          cargo run --release -- server 6379 &
          sleep 5
          cd clients/go/fastkv && go test -v -count=1 -timeout 30s ./...
      - uses: actions/upload-artifact@v4
        with:
          name: go-client
          path: clients/go/fastkv/bin/
          if-no-files-found: error

  # ──────────────────────────────────────
  # 4. Java client
  # ──────────────────────────────────────
  client-java:
    name: Java client (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: server
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - shell: bash
        run: |
          mkdir -p clients/java/target/classes
          javac -d clients/java/target/classes clients/java/src/*.java
          cargo run --release -- server 6379 &
          sleep 5
          java -Dfastkv.host=localhost -Dfastkv.port=6379 -cp clients/java/target/classes com.fastkv.client.IntegrationTest
          java -Dfastkv.host=localhost -Dfastkv.port=6379 -cp clients/java/target/classes com.fastkv.client.IntegrationTestReactive

  # ──────────────────────────────────────
  # 5. Node.js client
  # ──────────────────────────────────────
  client-node:
    name: Node.js client (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: server
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - shell: bash
        run: |
          cargo run --release -- server 6379 &
          sleep 5
          node clients/node/fastkv/tests/test_integration.js localhost 6379

  # ──────────────────────────────────────
  # 6. Python client
  # ──────────────────────────────────────
  client-python:
    name: Python (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: server
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - shell: bash
        env:
          FASTKV_HOST: localhost
          FASTKV_PORT: "6379"
        run: |
          cargo run --release -- server 6379 &
          sleep 5
          python clients/python/tests/test_integration.py
          python clients/python/tests/test_async_integration.py

  # ──────────────────────────────────────
  # 7. Release — только при пуше тега v*
  # ──────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [server, client-rust, client-go, client-java, client-node, client-python]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - name: Build Linux amd64
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Build Linux arm64
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
            cargo build --release --target aarch64-unknown-linux-gnu

      - uses: actions/download-artifact@v4
        with:
          name: go-client
          path: dist/

      - shell: bash
        run: |
          cp target/x86_64-unknown-linux-gnu/release/fast_kv dist/fastkv-server-linux-amd64
          cp target/aarch64-unknown-linux-gnu/release/fast_kv dist/fastkv-server-linux-arm64

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
